server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/font-woff application/font-woff2 image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /platform/login;
    }

    location /health {
        proxy_pass http://backend:8080/health;
    }

    location /api/v1/platform/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/shop/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    location /platform/ {
        try_files $uri $uri/ /index.html;
    }

    location /shop/ {
        try_files $uri $uri/ /index.html;
    }
}
